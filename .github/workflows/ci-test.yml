name: Cloudshare CI (Tests)

on:
  push:
    branches: [ "**", "!master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'


      - name: Run Tests
        run: mvn clean verify